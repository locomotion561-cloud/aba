<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Avcısı - Mobil Uyumlu</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        #game-header { text-align: center; padding: 10px; font-size: 1.5rem; }
        
        /* Görsel Alanı */
        #draggable-item { 
            width: 250px; height: 250px; margin: 20px auto; 
            border: 5px solid #333; border-radius: 15px; 
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }

        /* Kategori Kutuları - Ekranın Altında Yan Yana */
        #drop-zones-container {
            position: absolute; bottom: 20px; width: 95%;
            display: flex; justify-content: space-between; gap: 10px;
        }
        .zone { 
            flex: 1; padding: 20px 5px; background: #3498db; color: white;
            border-radius: 10px; text-align: center; font-weight: bold; font-size: 1rem;
        }
    </style>
</head>
<body>

    <div id="game-header">
        <div id="score">Puan: 0</div>
        <div id="word-text">Yükleniyor...</div>
    </div>

    <div id="draggable-item" draggable="true"></div>

    <div id="drop-zones-container">
        <div class="zone" data-category="Meyve">Meyve</div>
        <div class="zone" data-category="Eşya">Eşya</div>
        <div class="zone" data-category="Araç">Araç</div>
        <div class="zone" data-category="Hayvan">Hayvan</div>
    </div>

    <script>
        const gameData = [
            {word: "Elma", cat: "Meyve", img: "https://cdn.pixabay.com/photo/2016/01/05/17/51/apple-1122537_960_720.jpg"},
            {word: "Masa", cat: "Eşya", img: "https://cdn.pixabay.com/photo/2014/05/21/15/28/furniture-350177_960_720.jpg"},
            {word: "Araba", cat: "Araç", img: "https://cdn.pixabay.com/photo/2012/04/12/23/47/car-30984_960_720.png"},
            {word: "Kedi", cat: "Hayvan", img: "https://cdn.pixabay.com/photo/2017/02/20/18/03/cat-2083492_960_720.jpg"}
        ];

        let currentItem = {};
        const itemEl = document.getElementById('draggable-item');
        const wordEl = document.getElementById('word-text');

        function loadItem() {
            currentItem = gameData[Math.floor(Math.random() * gameData.length)];
            wordEl.innerText = currentItem.word;
            itemEl.style.backgroundImage = `url('${currentItem.img}')`;
        }

        // Sürükle ve Bırak mantığı
        itemEl.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', currentItem.cat));

        document.querySelectorAll('.zone').forEach(zone => {
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('drop', e => {
                if(e.dataTransfer.getData('text') === zone.getAttribute('data-category')) {
                    alert("Doğru!");
                    loadItem();
                } else {
                    alert("Tekrar dene!");
                }
            });
        });

        loadItem();
    </script>
</body>
</html>
