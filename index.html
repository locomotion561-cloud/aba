<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Avcısı Pro</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; overflow: hidden; }
        
        #game-header { position: absolute; top: 20px; text-align: center; }
        #score { font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
        #word-text { font-size: 1.8rem; font-weight: bold; color: #34495e; margin: 10px 0; }
        
        #draggable-item { 
            width: 220px; height: 220px; border: 5px solid #333; border-radius: 15px; 
            background-size: cover; background-position: center; background-color: #fff;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2); cursor: grab;
            transition: opacity 0.2s, background-image 0.3s;
        }

        /* 4 Köşeye yerleştirme */
        .zone { 
            position: absolute; width: 150px; padding: 20px; background: #3498db; color: white;
            border-radius: 15px; text-align: center; font-weight: bold; cursor: pointer;
            transition: background 0.3s;
        }
        #zone-meyve { top: 50px; left: 50px; }
        #zone-esya { top: 50px; right: 50px; }
        #zone-arac { bottom: 50px; left: 50px; }
        #zone-hayvan { bottom: 50px; right: 50px; }
    </style>
</head>
<body>

    <div id="game-header">
        <div id="score">Puan: 0</div>
        <div id="word-text">Yükleniyor...</div>
    </div>

    <div id="draggable-item" draggable="true"></div>

    <div id="zone-meyve" class="zone" data-category="Meyve">Meyve</div>
    <div id="zone-esya" class="zone" data-category="Eşya">Eşya</div>
    <div id="zone-arac" class="zone" data-category="Araç">Araç</div>
    <div id="zone-hayvan" class="zone" data-category="Hayvan">Hayvan</div>

    <script>
        const gameData = [
            // MEYVELER (20)
            {word: "Elma", cat: "Meyve", img: "images/elma.jpg"}, {word: "Muz", cat: "Meyve", img: "images/muz.jpg"}, {word: "Çilek", cat: "Meyve", img: "images/cilek.jpg"}, {word: "Portakal", cat: "Meyve", img: "images/portakal.jpg"}, {word: "Üzüm", cat: "Meyve", img: "images/uzum.jpg"}, {word: "Kiraz", cat: "Meyve", img: "images/kiraz.jpg"}, {word: "Limon", cat: "Meyve", img: "images/limon.jpg"}, {word: "Karpuz", cat: "Meyve", img: "images/karpuz.jpg"}, {word: "Armut", cat: "Meyve", img: "images/armut.jpg"}, {word: "Ananas", cat: "Meyve", img: "images/ananas.jpg"}, {word: "Kivi", cat: "Meyve", img: "images/kivi.jpg"}, {word: "Şeftali", cat: "Meyve", img: "images/seftali.jpg"}, {word: "Nar", cat: "Meyve", img: "images/nar.jpg"}, {word: "Mango", cat: "Meyve", img: "images/mango.jpg"}, {word: "Erik", cat: "Meyve", img: "images/erik.jpg"}, {word: "İncir", cat: "Meyve", img: "images/incir.jpg"}, {word: "Kavun", cat: "Meyve", img: "images/kavun.jpg"}, {word: "Dut", cat: "Meyve", img: "images/dut.jpg"}, {word: "Kayısı", cat: "Meyve", img: "images/kayisi.jpg"}, {word: "Ayva", cat: "Meyve", img: "images/ayva.jpg"},
            // EŞYALAR (20)
            {word: "Masa", cat: "Eşya", img: "images/masa.jpg"}, {word: "Sandalye", cat: "Eşya", img: "images/sandalye.jpg"}, {word: "Lamba", cat: "Eşya", img: "images/lamba.jpg"}, {word: "Bardak", cat: "Eşya", img: "images/bardak.jpg"}, {word: "Kitap", cat: "Eşya", img: "images/kitap.jpg"}, {word: "Gözlük", cat: "Eşya", img: "images/gozluk.jpg"}, {word: "Saat", cat: "Eşya", img: "images/saat.jpg"}, {word: "Yastık", cat: "Eşya", img: "images/yastik.jpg"}, {word: "Anahtar", cat: "Eşya", img: "images/anahtar.jpg"}, {word: "Telefon", cat: "Eşya", img: "images/telefon.jpg"}, {word: "Çanta", cat: "Eşya", img: "images/canta.jpg"}, {word: "Makas", cat: "Eşya", img: "images/makas.jpg"}, {word: "Tarak", cat: "Eşya", img: "images/tarak.jpg"}, {word: "Çatal", cat: "Eşya", img: "images/catal.jpg"}, {word: "Kaşık", cat: "Eşya", img: "images/kasik.jpg"}, {word: "Cüzdan", cat: "Eşya", img: "images/cuzdan.jpg"}, {word: "Şemsiye", cat: "Eşya", img: "images/semsiye.jpg"}, {word: "Kutu", cat: "Eşya", img: "images/kutu.jpg"}, {word: "Tabak", cat: "Eşya", img: "images/tabak.jpg"}, {word: "Kalem", cat: "Eşya", img: "images/kalem.jpg"},
            // ARAÇLAR (20)
            {word: "Araba", cat: "Araç", img: "images/araba.jpg"}, {word: "Otobüs", cat: "Araç", img: "images/otobus.jpg"}, {word: "Bisiklet", cat: "Araç", img: "images/bisiklet.jpg"}, {word: "Uçak", cat: "Araç", img: "images/ucak.jpg"}, {word: "Gemi", cat: "Araç", img: "images/gemi.jpg"}, {word: "Taksi", cat: "Araç", img: "images/taksi.jpg"}, {word: "Tren", cat: "Araç", img: "images/tren.jpg"}, {word: "Motosiklet", cat: "Araç", img: "images/motosiklet.jpg"}, {word: "Helikopter", cat: "Araç", img: "images/helikopter.jpg"}, {word: "Kamyon", cat: "Araç", img: "images/kamyon.jpg"}, {word: "Traktör", cat: "Araç", img: "images/traktor.jpg"}, {word: "Vapur", cat: "Araç", img: "images/vapur.jpg"}, {word: "Metrobüs", cat: "Araç", img: "images/metrobus.jpg"}, {word: "Ambulans", cat: "Araç", img: "images/ambulans.jpg"}, {word: "İtfaiye", cat: "Araç", img: "images/itfaiye.jpg"}, {word: "Scooter", cat: "Araç", img: "images/scooter.jpg"}, {word: "Denizaltı", cat: "Araç", img: "images/denizalti.jpg"}, {word: "Roket", cat: "Araç", img: "images/roket.jpg"}, {word: "Tramvay", cat: "Araç", img: "images/tramvay.jpg"}, {word: "Kayık", cat: "Araç", img: "images/kayik.jpg"},
            // HAYVANLAR (20)
            {word: "Kedi", cat: "Hayvan", img: "images/kedi.jpg"}, {word: "Köpek", cat: "Hayvan", img: "images/kopek.jpg"}, {word: "Kuş", cat: "Hayvan", img: "images/kus.jpg"}, {word: "At", cat: "Hayvan", img: "images/at.jpg"}, {word: "İnek", cat: "Hayvan", img: "images/inek.jpg"}, {word: "Aslan", cat: "Hayvan", img: "images/aslan.jpg"}, {word: "Fil", cat: "Hayvan", img: "images/fil.jpg"}, {word: "Tavşan", cat: "Hayvan", img: "images/tavsan.jpg"}, {word: "Maymun", cat: "Hayvan", img: "images/maymun.jpg"}, {word: "Zürafa", cat: "Hayvan", img: "images/zurafa.jpg"}, {word: "Balık", cat: "Hayvan", img: "images/balik.jpg"}, {word: "Koyun", cat: "Hayvan", img: "images/koyun.jpg"}, {word: "Tavuk", cat: "Hayvan", img: "images/tavuk.jpg"}, {word: "Ördek", cat: "Hayvan", img: "images/ordek.jpg"}, {word: "Kaplan", cat: "Hayvan", img: "images/kaplan.jpg"}, {word: "Ayı", cat: "Hayvan", img: "images/ayi.jpg"}, {word: "Kelebek", cat: "Hayvan", img: "images/kelebek.jpg"}, {word: "Arı", cat: "Hayvan", img: "images/ari.jpg"}, {word: "Penguen", cat: "Hayvan", img: "images/penguen.jpg"}, {word: "Yılan", cat: "Hayvan", img: "images/yilan.jpg"}
        ];

        let score = 0, currentItem = {};
        const itemEl = document.getElementById('draggable-item'), wordEl = document.getElementById('word-text'), scoreEl = document.getElementById('score');

        function loadItem() {
            currentItem = gameData[Math.floor(Math.random() * gameData.length)];
            wordEl.innerText = currentItem.word;
            itemEl.style.backgroundImage = `url('${currentItem.img}')`;
        }

        itemEl.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text', currentItem.cat); itemEl.style.opacity = '0.4'; });
        itemEl.addEventListener('dragend', () => itemEl.style.opacity = '1');

        document.querySelectorAll('.zone').forEach(zone => {
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('drop', e => {
                if(e.dataTransfer.getData('text') === zone.getAttribute('data-category')) {
                    score += 10; scoreEl.innerText = "Puan: " + score; loadItem();
                } else {
                    zone.style.background = "#e74c3c";
                    setTimeout(() => zone.style.background = "#3498db", 500);
                }
            });
        });

        loadItem();
    </script>
</body>
</html>
