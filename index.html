    <title>Kategori Avcısı Pro</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; background: #f0f2f5; }
        
        #game-header { text-align: center; padding: 15px; }
        #score { font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
        #word-text { font-size: 1.8rem; font-weight: bold; color: #34495e; margin: 10px 0; }
        
        /* Görsel Alanı - Ekranın orta kısmını kaplar */
        #draggable-item { 
            width: 220px; height: 220px; border: 5px solid #333; border-radius: 15px; 
            background-size: cover; background-position: center; background-color: #fff;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2); cursor: grab;
        }

        /* Kategoriler - En alta sabitle ve birbirine girmesini engelle */
        #drop-zones-container {
            position: absolute; bottom: 20px; width: 95%; max-width: 600px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .zone { 
            padding: 15px 5px; background: #3498db; color: white;
            border-radius: 10px; text-align: center; font-weight: bold; font-size: 0.9rem;
        }
    </style>
</head>

        let score = 0;
        let currentItem = {};
        const itemEl = document.getElementById('draggable-item');
        const wordEl = document.getElementById('word-text');
        const scoreEl = document.getElementById('score');

        function loadItem() {
            currentItem = gameData[Math.floor(Math.random() * gameData.length)];
            wordEl.innerText = currentItem.word;
            itemEl.style.backgroundImage = `url('${currentItem.img}')`;
        }

        // Sürükle ve Bırak
        itemEl.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', currentItem.cat));

        document.querySelectorAll('.zone').forEach(zone => {
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('drop', e => {
                if(e.dataTransfer.getData('text') === zone.getAttribute('data-category')) {
                    score += 10;
                    scoreEl.innerText = "Puan: " + score;
                    loadItem();
                } else {
                    alert("Tekrar dene!");
                }
            });
        });

        loadItem();
