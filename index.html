<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Avcısı</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: space-around; height: 100vh; margin: 0; background-color: #f0f2f5; }
        #game-area { text-align: center; }
        #draggable-item { width: 150px; height: 150px; background: white; border: 3px solid #333; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: grab; padding: 10px; touch-action: none; }
        img { width: 80px; height: 80px; object-fit: contain; }
        .drop-zones { display: flex; gap: 10px; width: 100%; justify-content: center; padding-bottom: 50px; }
        .zone { width: 80px; height: 80px; border: 3px dashed #666; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; text-align: center; background: white; }
        #score { font-size: 1.5rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="draggable-item" draggable="true">
            <img id="item-img" src="" alt="nesne">
            <span id="item-text"></span>
        </div>
        <div id="score">Puan: 0</div>
    </div>

    <div class="drop-zones">
        <div class="zone" ondrop="drop(event)" ondragover="allowDrop(event)" data-cat="Meyve">Meyve</div>
        <div class="zone" ondrop="drop(event)" ondragover="allowDrop(event)" data-cat="Eşya">Eşya</div>
        <div class="zone" ondrop="drop(event)" ondragover="allowDrop(event)" data-cat="Araç">Araç</div>
        <div class="zone" ondrop="drop(event)" ondragover="allowDrop(event)" data-cat="Hayvan">Hayvan</div>
    </div>

    <script>
        const items = [
            {word: "Elma", cat: "Meyve", img: "🍎"},
            {word: "Masa", cat: "Eşya", img: "🪑"},
            {word: "Araba", cat: "Araç", img: "🚗"},
            {word: "Kedi", cat: "Hayvan", img: "🐱"}
        ];

        let score = 0;
        let currentItem = {};

        function nextItem() {
            currentItem = items[Math.floor(Math.random() * items.length)];
            document.getElementById('item-text').innerText = currentItem.word;
            document.getElementById('item-img').src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E" + currentItem.img + "%3C/text%3E%3C/svg%3E";
        }

        function allowDrop(ev) { ev.preventDefault(); }

        document.getElementById('draggable-item').addEventListener('dragstart', (ev) => {
            ev.dataTransfer.setData("text", currentItem.cat);
        });

        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            if (data === ev.target.getAttribute('data-cat')) {
                score += 10;
                document.getElementById('score').innerText = "Puan: " + score;
                nextItem();
            }
        }

        nextItem();
    </script>
</body>
</html>
