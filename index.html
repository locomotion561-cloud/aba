<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Avcısı Pro</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; touch-action: none; background: #f9f9f9; }
        #game-area { height: 300px; display: flex; align-items: center; justify-content: center; }
        #draggable-item { width: 150px; height: 150px; cursor: grab; border: 2px solid #333; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .drop-zones { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 500px; }
        .zone { padding: 20px; background: #e0e0e0; border: 2px dashed #888; text-align: center; border-radius: 10px; font-weight: bold; }
        #score { font-size: 1.5rem; margin: 20px; }
    </style>
</head>
<body>

    <div id="score">Puan: 0</div>
    <div id="game-area">
        <div id="draggable-item" draggable="true" ondragstart="drag(event)">Muz Görseli</div>
    </div>

    <div class="drop-zones">
        <div class="zone" ondrop="drop(event, 'Meyve')" ondragover="allowDrop(event)">Meyve</div>
        <div class="zone" ondrop="drop(event, 'Eşya')" ondragover="allowDrop(event)">Eşya</div>
        <div class="zone" ondrop="drop(event, 'Araç')" ondragover="allowDrop(event)">Araç</div>
        <div class="zone" ondrop="drop(event, 'Hayvan')" ondragover="allowDrop(event)">Hayvan</div>
    </div>

    <script>
        let score = 0;
        let currentItem = { word: "Muz", cat: "Meyve" };

        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", currentItem.cat); }

        function drop(ev, cat) {
            ev.preventDefault();
            let data = ev.dataTransfer.getData("text");
            if (data === cat) {
                score += 10;
                document.getElementById('score').innerText = "Puan: " + score;
                alert("Doğru! 🎉");
                // Burada yeni kelimeyi yükleyen bir fonksiyon çağrılabilir
            } else {
                alert("Tekrar dene! 🔄");
            }
        }
    </script>
</body>
</html>
